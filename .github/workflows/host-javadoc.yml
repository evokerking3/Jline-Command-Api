name: Deploy command-api Javadoc
on:
  push:
    branches: [ main ]
  workflow_dispatch: 
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Javadoc for command-api
        # Replace 'command-api' with your exact gradle module name
        run: ./gradlew :command-api:javadoc 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: command-api/build/docs/javadoc # Path where Gradle generates Javadoc
          branch: gh-pages
